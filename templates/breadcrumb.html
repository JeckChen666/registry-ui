{{ block breadcrumb() }}
    <li class="breadcrumb-item">
        <a href="{{ basePath }}/" class="breadcrumb-link">
            <i class="bi bi-house-door"></i>
            <span>首页</span>
        </a>
    </li>
    {{if . != nil}}
        {{x := ""}}
        {{range _, p := split(., "/")}}
        {{x = x + "/" + p}}
        <li class="breadcrumb-item">
            <a href="{{ basePath }}{{ x }}" class="breadcrumb-link">{{ p }}</a>
        </li>
        {{end}}
    {{end}}
{{ end }}
